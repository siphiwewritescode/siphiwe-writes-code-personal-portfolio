<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#23E5E7"/>
      <stop offset="100%" stop-color="#FF7ABC"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#23E5E7"/>
      <stop offset="100%" stop-color="#FF7ABC"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#080c10"/>

  <!-- Subtle glass border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5.5"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- Gradient top accent bar -->
  <rect x="0" y="0" width="32" height="2.5" rx="2" fill="url(#bar)"/>

  <!-- Italic S in DM-Serif-style serif -->
  <text x="16" y="24"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="22"
        font-weight="400"
        fill="url(#grad)"
        text-anchor="middle"
        dominant-baseline="auto">S</text>

  <!-- Small underscore / cursor blink hint -->
  <rect x="19" y="25" width="5" height="1.5" rx="0.75" fill="#23E5E7" opacity="0.7"/>
</svg>
